<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Álbum de Fotografias — Exemplo de Tabela</title>
</head>
<body bgcolor="#FF1493">
 <center>
  <!-- Título da página -->
  <h1>Exemplo de Tabela em HTML</h1>

  <!-- Início da tabela -->
  <table border="1">
    <!-- A tag <caption> serve como legenda para a tabela -->
    <caption>Exemplo com 4 linhas e 3 colunas</caption>

    <!-- Primeira linha da tabela -->
    <tr>
      <!-- O atributo colspan="3" mescla 3 colunas em uma só célula -->
      <th colspan="3">Álbum de Fotografias</th>
    </tr>

    <!-- Segunda linha da tabela -->
    <tr>
      <!-- Cada <td> representa uma célula de dados -->
      <td>🌸</td>
      <td>🌼</td>
      <td>🌻</td>
    </tr>

    <!-- Terceira linha da tabela -->
    <tr>
      <td>🌹</td>
      <td>🌺</td>
      <td>🌷</td>
    </tr>

    <!-- Quarta linha da tabela -->
    <tr>
      <td>💐</td>
      <td>🪻</td>
      <td>🪷</td>
    </tr>
  </table>
  <!-- Fim da tabela -->
 </center>
</body>
</html>
